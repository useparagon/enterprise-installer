name: Stage Charts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Git tag to check out and publish (must exist). Chart trees use __PARAGON_VERSION__ = this tag only."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  stage-charts:
    name: Package & Push Helm Charts to ECR
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 055987364777.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY_PREFIX: paragon-ci
      AWS_REGION: us-east-1
      CHARTS: paragon-onprem paragon-logging paragon-monitoring

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.1
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      # ubuntu-latest includes rsync; common act images (e.g. catthehacker/ubuntu:js-22.04) do not
      - name: Ensure rsync is installed
        run: |
          if command -v rsync >/dev/null 2>&1; then
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y rsync
          else
            apt-get update -qq
            apt-get install -y rsync
          fi

      - name: Update chart fixtures
        run: node scripts/update-charts.mjs charts/files/service-inputs.json

      - name: Stage and version charts
        id: stamp
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          staging="$RUNNER_TEMP/charts"
          mkdir -p "$staging"

          rsync -aq --delete \
            --exclude='example.yaml' \
            --exclude='values.placeholder.yaml' \
            --exclude='bootstrap/' \
            charts/ "$staging/"

          for chart in "$staging"/*/; do
            [ -d "$chart" ] || continue
            find "$chart" -type f -exec sed -i "s/__PARAGON_VERSION__/${version}/g" {} +
            echo "$(basename "$chart"): ${version}"
          done

          echo "staging=$staging" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.16.1

      - name: Build and package charts
        run: |
          set -euo pipefail
          staging="${{ steps.stamp.outputs.staging }}"
          pkg_dir="$RUNNER_TEMP/packages"
          mkdir -p "$pkg_dir"

          for chart_name in $CHARTS; do
            chart_dir="$staging/$chart_name"
            if [ ! -d "$chart_dir" ]; then
              echo "Skipping $chart_name (directory not found)"
              continue
            fi

            echo "=== Building $chart_name ==="
            for sub in "$chart_dir"/charts/*/; do
              [ -f "$sub/Chart.yaml" ] && helm dependency build "$sub" 2>/dev/null || true
            done
            helm dependency build "$chart_dir"
            helm package "$chart_dir" --destination "$pkg_dir"
          done

          echo "--- Packaged charts ---"
          ls -1 "$pkg_dir"/*.tgz

      # GitHub-hosted: OIDC → role. Local act: pass -s ACT_AWS_ACCESS_KEY_ID / -s ACT_AWS_SECRET_ACCESS_KEY
      # (and optional -s ACT_AWS_SESSION_TOKEN) for an IAM principal that can push to this ECR registry.
      - name: Configure AWS credentials (OIDC)
        if: ${{ !env.ACT }}
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: enterprise-chart-stage
          role-to-assume: arn:aws:iam::055987364777:role/helm-repo-manager

      - name: Configure AWS credentials (act — access keys)
        if: ${{ env.ACT }}
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.ACT_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ACT_AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.ACT_AWS_SESSION_TOKEN }}

      # catthehacker/ubuntu:js-22.04 has no aws CLI; ubuntu-latest on GitHub does
      - name: Ensure AWS CLI is installed
        run: |
          if command -v aws >/dev/null 2>&1; then
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y awscli
          else
            apt-get update -qq
            apt-get install -y awscli
          fi
          aws --version

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | helm registry login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Push charts to ECR
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/packages"

          dest="oci://${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}"
          for tgz in *.tgz; do
            echo "Pushing $tgz -> $dest (Helm maps chart name under ${ECR_REPOSITORY_PREFIX}/)"
            helm push "$tgz" "$dest"
          done
