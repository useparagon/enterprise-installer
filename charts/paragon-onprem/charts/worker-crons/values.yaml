# Default values for worker-crons.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: useparagon/worker-crons
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 'latest'

service:
  type: ClusterIP
  port: 1714

resources:
  limits:
    memory: 800Mi
  requests:
    cpu: 100m
    memory: 800Mi

autoscaling:
  enabled: false
  # minReplicas: 2
  # maxReplicas: 20
  # targetCPUUtilizationPercentage: 75
  # targetMemoryUtilizationPercentage: 75

secretName: "paragon-secrets"

imagePullSecrets: []
nameOverride: ''
fullnameOverride: 'worker-crons'

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

env:
  WORKER_SHARED_AUTOSCALING_DISABLED: false
  WORKER_SHARED_SERVICE_MAX_INSTANCES: 20
  WORKER_SHARED_SERVICE_MIN_INSTANCES: 2

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/scheme: "http"
  prometheus.io/path: "/stats/metrics"
  prometheus.io/port: "1714"

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  certificate: ''
  enabled: true
  className: ''
  host: '' # When empty, will use chart name + domain
  healthcheck_path: /healthz

probes:
  liveness:
    failureThreshold: 12

nodeSelector: {}

tolerations: []

affinity: {}

tls_secret: ''
