# Default values for pheme.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: useparagon/pheme
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 'latest'

service:
  type: ClusterIP
  port: 1709

resources:
  limits:
    memory: 500Mi
  requests:
    cpu: 100m
    memory: 500Mi

autoscaling:
  enabled: false
  # minReplicas: 2
  # maxReplicas: 4
  # targetCPUUtilizationPercentage: 75
  # targetMemoryUtilizationPercentage: 75

secretName: "paragon-secrets"

imagePullSecrets:
  - name: docker-cfg
nameOverride: ''
fullnameOverride: 'pheme'

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

env:
  WORKER_SHARED_AUTOSCALING_DISABLED: false
  WORKER_SHARED_SERVICE_MAX_INSTANCES: 4
  WORKER_SHARED_SERVICE_MIN_INSTANCES: 2

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/scheme: "http"
  prometheus.io/path: "/stats/metrics"
  prometheus.io/port: "1709"

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  certificate: ''
  enabled: true
  className: ''
  host: '' # When empty, will use chart name + domain
  healthcheck_path: /healthz

nodeSelector: {}

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 1
      preference:
        matchExpressions:
        - key: useparagon.com/capacityType
          operator: In
          values:
          - spot

tls_secret: ''

env:
  WORKER_SHARED_AUTOSCALING_DISABLED: false
  WORKER_SHARED_SERVICE_MAX_INSTANCES: 4
  WORKER_SHARED_SERVICE_MIN_INSTANCES: 2
