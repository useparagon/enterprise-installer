{{- if .Values.restart.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: restart-paragon-pods-cronjob
spec:
  schedule: "{{ .Values.restart.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: paragon-restart-manager
          containers:
          - name: restart-pods
            image: alpine/kubectl:1.34.0
            command:
            - /bin/sh
            - -c
            - |
              for kind in deployment statefulset; do
                for filter in paragon-on-prem paragon-monitoring; do
                  for name in $(kubectl get $kind -n paragon -l app.kubernetes.io/instance=$filter -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}'); do
                    echo "Restarting $kind/$name"
                    kubectl rollout restart "$kind/$name" -n paragon
                    kubectl rollout status "$kind/$name" -n paragon --timeout=300s      
                  done
                done
              done
          restartPolicy: OnFailure
{{- end }}
