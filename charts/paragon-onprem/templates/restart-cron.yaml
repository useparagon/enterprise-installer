{{- if .Values.restart.enabled }}
{{- $seed := .Values.global.env.PARAGON_DOMAIN | default .Release.Name | toString }}
{{- $windowMinutes := int (.Values.restart.windowMinutes | default 120) }}
{{- $offsetMinutes := cond (gt $windowMinutes 0) (mod (adler32sum $seed) $windowMinutes) 0 }}
{{- $baseTotalMinutes := add (mul (int .Values.restart.hour) 60) (int .Values.restart.minute) }}
{{- $scheduledTotalMinutes := add $baseTotalMinutes $offsetMinutes }}
{{- $scheduleMinute := mod $scheduledTotalMinutes 60 }}
{{- $scheduleHour := mod (div $scheduledTotalMinutes 60) 24 }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: restart-paragon-pods-cronjob
  annotations:
    paragon.useparagon.com/restart-window-minutes: {{ $windowMinutes | quote }}
    paragon.useparagon.com/restart-offset-minutes: {{ $offsetMinutes | quote }}
spec:
  schedule: "{{ $scheduleMinute }} {{ $scheduleHour }} * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: paragon-restart-manager
          containers:
          - name: restart-pods
            image: alpine/kubectl:1.33.4
            command:
            - /bin/sh
            - -c
            - |
              for kind in deployment statefulset; do
                for filter in paragon-on-prem paragon-monitoring; do
                  for name in $(kubectl get $kind -n paragon -l app.kubernetes.io/instance=$filter -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}'); do
                    echo "Restarting $kind/$name"
                    kubectl rollout restart "$kind/$name" -n paragon
                    kubectl rollout status "$kind/$name" -n paragon --timeout=300s      
                  done
                done
              done
          restartPolicy: OnFailure
{{- end }}
