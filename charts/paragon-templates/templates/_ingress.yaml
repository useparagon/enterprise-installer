{{/*
Standard Ingress for all microservices.
Call with: include "ingress.standard" $
*/}}
{{- define "ingress.standard" -}}
{{/*
Per-service ingress is gated by both the per-service value and an optional global
override: global.ingress.enabled (when set) is AND-ed with .Values.ingress.enabled.
This lets a single global.ingress.enabled=false disable every per-service ingress
(e.g. GCP, which uses the shared-ingress template instead), while per-service
ingress.enabled=false still disables an individual service. When global.ingress.enabled
is unset (AWS/Azure), behavior is unchanged.
*/}}
{{- $enabled := .Values.ingress.enabled -}}
{{- if and (hasKey .Values "global") (hasKey .Values.global "ingress") (hasKey .Values.global.ingress "enabled") -}}
{{- $enabled = and $enabled .Values.global.ingress.enabled -}}
{{- end -}}
{{- if $enabled -}}
{{- $name := .Chart.Name -}}
{{- $fullName := include (printf "%s.fullname" $name) . -}}
{{- $svcPort := .Values.service.port -}}
{{- $cert := .Values.ingress.certificate -}}
{{- if not $cert -}}
{{- $cert = dig "ingress" "certificate" "" .Values.global -}}
{{- end -}}
{{- $lbName := .Values.ingress.load_balancer_name -}}
{{- if not $lbName -}}
{{- $lbName = dig "ingress" "load_balancer_name" "" .Values.global -}}
{{- end -}}
{{- if not $lbName -}}
{{- $lbName = "paragon" -}}
{{- end -}}
{{- $className := .Values.ingress.className -}}
{{- if not $className -}}
{{- $className = dig "ingress" "className" "" .Values.global -}}
{{- end -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include (printf "%s.labels" $name) . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
    {{- if eq .Values.global.env.HOST_ENV "AWS_K8" }}
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    {{- if $cert }}
    alb.ingress.kubernetes.io/certificate-arn: {{ $cert }}
    {{- end }}
    alb.ingress.kubernetes.io/group.name: {{ $lbName }}
    {{- if hasKey .Values.ingress "group_order" }}
    alb.ingress.kubernetes.io/group.order: '{{ .Values.ingress.group_order }}'
    {{- end }}
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthcheck_path | default "/healthz" }}
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/load-balancer-name: {{ $lbName }}
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme | default "internet-facing" }}
    alb.ingress.kubernetes.io/ssl-policy: {{ .Values.ingress.ssl_policy | default "ELBSecurityPolicy-TLS13-1-2-2021-06" }}
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/target-group-attributes: deregistration_delay.timeout_seconds=30
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
    {{- if hasKey .Values.ingress "ip_whitelist" }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.ingress.ip_whitelist }}
    {{- end }}
    {{- if and .Values.ingress.wafv2_acl_arn (ne .Values.ingress.wafv2_acl_arn "none") }}
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ .Values.ingress.wafv2_acl_arn }}
    {{- end }}
    {{- else if eq .Values.global.env.HOST_ENV "AZURE_K8" }}
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: 128k
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers: 256k
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: {{ .Values.ingress.healthcheck_path | default "/healthz" }}
    {{- if eq (default "internet-facing" .Values.ingress.scheme) "internal" }}
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
    {{- end }}
    {{- else if eq .Values.global.env.HOST_ENV "GCP_K8" }}
    kubernetes.io/ingress.class: {{ $className | default "gce" }}
    {{- if $cert }}
    ingress.gcp.kubernetes.io/pre-shared-cert: {{ $cert }}
    {{- end }}
    ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthcheck_path | default "/healthz" }}
    kubernetes.io/ingress.allow-http: "true"
    {{- $gcpStaticIp := .Values.ingress.loadBalancerName | default (dig "ingress" "loadBalancerName" "" .Values.global) }}
    {{- if $gcpStaticIp }}
    kubernetes.io/ingress.global-static-ip-name: {{ $gcpStaticIp }}
    {{- end }}
    {{- $gcpFrontendConfig := .Values.ingress.frontendConfig | default (dig "ingress" "frontendConfig" "" .Values.global) }}
    {{- if $gcpFrontendConfig }}
    networking.gke.io/v1beta1.FrontendConfig: {{ $gcpFrontendConfig }}
    {{- end }}
    {{- else }}
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-buffer-size: 128k
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers: 256k
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- end }}
spec:
  {{- if eq .Values.global.env.HOST_ENV "AWS_K8" }}
  ingressClassName: {{ $className | default "alb" }}
  {{- else if eq .Values.global.env.HOST_ENV "GCP_K8" }}
  ingressClassName: {{ $className | default "gce" }}
  {{- else }}
  ingressClassName: {{ $className | default "nginx" }}
  {{- end }}
  {{- if or (eq .Values.global.env.HOST_ENV "AZURE_K8") (not (or (eq .Values.global.env.HOST_ENV "AWS_K8") (eq .Values.global.env.HOST_ENV "GCP_K8"))) }}
  tls:
    - hosts:
        - {{ include (printf "%s.ingressHost" $name) . }}
      secretName: {{ .Values.tls_secret | default (printf "%s-tls" (include (printf "%s.fullname" $name) .)) }}
  {{- else if eq .Values.global.env.HOST_ENV "GCP_K8" }}
  {{- $gcpLbIp := .Values.ingress.loadBalancerIP | default (dig "ingress" "loadBalancerIP" "" .Values.global) }}
  {{- if $gcpLbIp }}
  loadBalancerIP: {{ $gcpLbIp }}
  {{- end }}
  {{- end }}
  rules:
    {{- if and (eq .Values.global.env.HOST_ENV "AWS_K8") (eq $name "hermes") }}
    - http:
        paths:
          - path: /projects/*/sdk/triggers/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
    {{- end }}
    {{- if and (eq .Values.global.env.HOST_ENV "AWS_K8") (eq $name "worker-proxy") }}
    - http:
        paths:
          - path: /projects/*/sdk/proxy/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
    {{- end }}
    - host: {{ include (printf "%s.ingressHost" $name) . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
{{- end }}
{{- end -}}

