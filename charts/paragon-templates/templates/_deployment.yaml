{{/*
Standard deployment for all microservices.
Call with: include "deployment.standard" (dict "root" $ "command" "./service-name" "namespaceTemplate" "service.namespace")
Parameters:
- root: Required. The root context ($)
- command: Optional. Command to run
- namespaceTemplate: Optional. Template name to use for namespace (e.g. "kube-state-metrics.namespace")
*/}}
{{- define "deployment.standard" -}}
{{- $root := .root -}}
{{- $command := .command -}}
{{- $namespaceTemplate := .namespaceTemplate -}}
{{- $name := $root.Chart.Name -}}
{{- $redisCaCertEnabled := and $root.Values.global (kindIs "map" $root.Values.global) (hasKey $root.Values.global "redisCaCert") (kindIs "map" $root.Values.global.redisCaCert) (hasKey $root.Values.global.redisCaCert "enabled") $root.Values.global.redisCaCert.enabled -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include (printf "%s.fullname" $name) $root }}
  {{- if $namespaceTemplate }}
  namespace: {{ include $namespaceTemplate $root }}
  {{- end }}
  labels:
    {{- include (printf "%s.labels" $name) $root | nindent 4 }}
spec:
  {{- if not (and $root.Values.autoscaling $root.Values.autoscaling.enabled) }}
  replicas: {{ $root.Values.replicaCount | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include (printf "%s.selectorLabels" $name) $root | nindent 6 }}
  template:
    metadata:
      {{- with $root.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include (printf "%s.selectorLabels" $name) $root | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 65
      {{- with $root.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include (printf "%s.serviceAccountName" $name) $root }}
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ $name }}
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}
          image: "{{ $root.Values.image.repository }}:{{ $root.Values.global.paragon_version | default $root.Values.global.env.VERSION }}"
          {{- if $command }}
          command: [{{ $command | quote }}]
          {{- end }}
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $root.Values.service.port }}
              protocol: TCP
          {{- $serviceData := fromJson (include "service.inputs" $root) }}
          {{- $category := $serviceData.category | default "" }}
          {{- if or (eq $category "microservice") (eq $category "worker") }}
          lifecycle:
            # need to sleep for `deregistration_delay` + 5s to prevent downtime on deployments
            # https://github.com/kubernetes-sigs/aws-load-balancer-controller/issues/1719#issuecomment-743452334
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 35
          livenessProbe:
            {{- include "probes.httpGet" (dict "root" $root "type" "liveness") | nindent 12 }}
          readinessProbe:
            {{- include "probes.httpGet" (dict "root" $root "type" "readiness") | nindent 12 }}
          startupProbe:
            {{- include "probes.httpGet" (dict "root" $root "type" "startup") | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
          env:
            {{- include "env.standard" $root | nindent 12 }}
            {{- if $redisCaCertEnabled }}
            # Point Node.js to the Redis CA certificate bundle
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/ssl/redis-ca/server-ca.pem
            {{- end }}
          {{- if $redisCaCertEnabled }}
          volumeMounts:
            - name: redis-ca-cert
              mountPath: /etc/ssl/redis-ca
              readOnly: true
          {{- end }}
      {{- if $redisCaCertEnabled }}
      volumes:
        - name: redis-ca-cert
          secret:
            secretName: {{ $root.Values.global.redisCaCert.secretName | default "redis-ca-cert" }}
      {{- end }}
      {{- $tsEnabled := true -}}
      {{- if $root.Values.topologySpread -}}
      {{- if hasKey $root.Values.topologySpread "enabled" -}}
      {{- $tsEnabled = $root.Values.topologySpread.enabled -}}
      {{- end -}}
      {{- end -}}
      {{- if $tsEnabled }}
      topologySpreadConstraints:
        - maxSkew: {{ if and $root.Values.topologySpread (hasKey $root.Values.topologySpread "maxSkew") }}{{ $root.Values.topologySpread.maxSkew }}{{ else }}1{{ end }}
          topologyKey: {{ if $root.Values.topologySpread }}{{ $root.Values.topologySpread.topologyKey | default "kubernetes.io/hostname" }}{{ else }}kubernetes.io/hostname{{ end }}
          labelSelector:
            matchLabels:
              {{- include (printf "%s.selectorLabels" $name) $root | nindent 14 }}
          whenUnsatisfiable: {{ if $root.Values.topologySpread }}{{ $root.Values.topologySpread.whenUnsatisfiable | default "ScheduleAnyway" }}{{ else }}ScheduleAnyway{{ end }}
      {{- end }}
      {{- with $root.Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.tolerations }}
      tolerations:
        {{ toYaml . | nindent 8 }}
{{- end }}
{{- end -}}
