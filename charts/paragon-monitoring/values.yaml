subchart:
  bull-exporter:
    enabled: true
  grafana:
    enabled: true
  kafka-exporter:
    enabled: false
  kube-state-metrics:
    enabled: true
  node-exporter:
    enabled: true
  pgadmin:
    enabled: true
  postgres-exporter:
    enabled: true
  prometheus:
    enabled: true
  redis-exporter:
    enabled: true
  redis-insight:
    enabled: true

global:
  # Optional private registry / Artifactory proxy (prepended to image repository paths).
  imageRegistry: ""
  # When set (including ""), rewrites useparagon/ prefix in repository paths. Omit to preserve useparagon/.
  # imageRepositoryPrefix: null
  migrationImageRegistry: ""
  imagePullSecrets: []
  pullPolicy: IfNotPresent
  testImage:
    repository: busybox
    tag: latest
  kubectlImage:
    repository: alpine/kubectl
    tag: "1.36.2"
  namespace: paragon
  env: {}
