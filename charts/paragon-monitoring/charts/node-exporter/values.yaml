image:
  repository: prom/node-exporter
  pullPolicy: IfNotPresent
  tag: 'latest'

fullnameOverride: 'node-exporter'

service:
  type: ClusterIP
  port: 9100

hostNetwork: true
hostPID: true

tolerations:
  - operator: Exists

nodeSelector: {}

resources:
  limits:
    memory: 100Mi
  requests:
    cpu: 100m
    memory: 100Mi

priorityClass:
  create: true
  name: "paragon-node-exporter-high"
